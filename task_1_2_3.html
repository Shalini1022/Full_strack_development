<!DOCTYPE html>
<html>

<head>
    <title>My HTML Page</title>
</head>

<body >
    <style>
        body {
            background-color: pink;
        }
    </style>

    <!-- Heading and Paragraph -->
    <h1>Welcome to My Website</h1>

    <p>
        This is a simple HTML page created using basic HTML tags.
        HTML is used to create and design web pages.
    </p>


    <!-- Image and Hyperlink -->
    <h2>Image and Hyperlink</h2>

    <img src="moon.jpg" width="300" height="200" alt="Sample Image">

    <br><br>

    <a href="https://en.wikipedia.org/wiki/Moon">
        Click here to know about Moon
    </a>


    <!-- Ordered List -->
    <h2>Ordered List</h2>

    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>


    <!-- Unordered List -->
    <h2>Unordered List</h2>

    <ul>
        <li>Python</li>
        <li>Java</li>
        <li>C++</li>
    </ul>

</body>

</html>
