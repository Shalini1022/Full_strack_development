<!DOCTYPE html>
<html>

<head>
    <title>HTML and CSS Example</title>

    <!-- Internal CSS -->
    <style>
        body {
            background-color: rgb(223, 220, 130);
        }

        table {
            border-collapse: collapse;
            width: 50%;
        }

        th, td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }
    </style>

    <!-- External CSS Link -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
<center>
    <h1>Welcome to My Web Page</h1>


    <!-- Inline CSS -->
    <p style="color: red; font-size: 20px;">
        This paragraph uses inline CSS to change text color and font size.
    </p>


    <!-- HTML Table -->
    <h2>Student Details</h2>

    <table>

        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
        </tr>

        <tr>
            <td>Kanishka</td>
            <td>20</td>
            <td>AI</td>
        </tr>

        <tr>
            <td>Kumutha</td>
            <td>21</td>
            <td>Computer Science</td>
        </tr>

    </table>


    <h2 class="external">
        This text uses External CSS
    </h2>

</center>
</body>

</html>
